name: MacInput
options:
  bundleIdPrefix: com.viczhang.macinput
  deploymentTarget:
    macOS: "13.0"
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    ALWAYS_SEARCH_USER_PATHS: NO

targets:
  MacInput:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: Sources
      - path: Resources/Assets.xcassets
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.viczhang.macinput
        PRODUCT_NAME: MacInput
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/MacInput.entitlements
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: YES
        GENERATE_INFOPLIST_FILE: NO
        ARCHS: arm64
        ONLY_ACTIVE_ARCH: YES
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"

  MacInputTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: Tests
    dependencies:
      - target: MacInput
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.viczhang.macinput.tests
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
